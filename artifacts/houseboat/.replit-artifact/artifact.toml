kind = "web"
previewPath = "/"
title = "Goa Houseboat"
version = "1.0.0"
id = "artifacts/houseboat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22712

[services.development]
run = "pnpm --filter @workspace/houseboat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/houseboat", "run", "build" ]
publicDir = "artifacts/houseboat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22712"
BASE_PATH = "/"
